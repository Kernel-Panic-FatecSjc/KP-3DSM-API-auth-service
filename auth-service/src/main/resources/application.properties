spring.application.name=auth-service

server.port=8081

# URL de conexão com o banco MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/bancoauth?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=fatec
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Mostra os comandos SQL no console
spring.jpa.show-sql=true

# Formata os comandos SQL para melhor visualização
spring.jpa.properties.hibernate.format_sql=true

# Cria o banco/tabelas automaticamente conforme suas entidades
spring.jpa.hibernate.ddl-auto=create

jwt.secret=sua_chave_secreta_muito_segura_com_mais_de_256_bits_para_hs256